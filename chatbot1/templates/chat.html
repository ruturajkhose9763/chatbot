<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyan Guru — {{ college.college_name }}</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/college-logo-small.png') }}">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="chat-fullpage-body">

<div class="chat-fullpage">
  <div class="chat-fullpage-header">
    <a href="{{ url_for('home') }}" class="chat-fullpage-back">← Back to website</a>
    <span class="chat-fullpage-title"><img src="{{ url_for('static', filename='img/college-logo.jpg') }}" alt="Logo" class="title-logo"> {{ college.college_name }} — Gyan Guru</span>
  </div>

  <div class="ledger-strip">
    <span>ASK</span>
    <button class="chip" data-q="What courses do you offer?">Courses</button>
    <button class="chip" data-q="Admission process kya hai?">Admission</button>
    <button class="chip" data-q="Fees kitni hai?">Fees</button>
    <button class="chip" data-q="Placement kaisa hai?">Placement</button>
    <button class="chip" data-q="Scholarship kaise apply kare?">Scholarship</button>
    <button class="chip" data-q="Hostel facility hai kya?">Hostel</button>
    <button class="chip" data-q="कॉलेजची वेळ काय आहे?">वेळ</button>
    <button type="button" id="voiceOutputToggle" class="voice-toggle-btn" title="Turn on/off voice replies">🔇</button>
  </div>

  <div id="chatWindow" class="chat-window chat-window-full">
    <div class="msg bot">
      <div class="avatar"><img src="{{ url_for('static', filename='img/college-logo.jpg') }}" alt="Bot"></div>
      <div class="bubble">
        Namaste! I'm <strong>Gyan Guru</strong> 🧑‍🏫 — ask me in English, Hindi, or Marathi about courses, admission, fees, placements, news, events, and more.
      </div>
    </div>
  </div>
  <div id="suggestionRow" class="suggestion-row"></div>

  <form id="chatForm" class="chat-input-row">
    <input type="text" id="userInput" placeholder="Type your question…" autocomplete="off" required>
    <button type="button" id="micBtn" class="mic-btn" title="Speak your question">🎤</button>
    <button type="submit" id="sendBtn">Send</button>
  </form>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
